events {}

http {
  server {
    listen 80;
    server_name api.garurcs.in;

    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl;
    server_name api.garurcs.in;

    ssl_certificate /etc/letsencrypt/live/api.garurcs.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.garurcs.in/privkey.pem;

    location / {
      proxy_pass http://backend:5055;
      proxy_http_version 1.1;

      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
    }
  }
}