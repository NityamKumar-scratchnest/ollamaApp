services:
  backend:
    build: .
    container_name: ollama-backend
    restart: always
    env_file:
      - .env
    expose:
      - "5055"
    networks:
      - app-network

  nginx:
    image: nginx:latest
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - /etc/letsencrypt:/etc/letsencrypt
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
